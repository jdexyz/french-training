<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Rémy — the Écoute mascot. Solid fills only: renders identically in every
       browser and in the icon pipeline (ImageMagick's SVG renderer drops gradients). -->

  <!-- backdrop -->
  <circle cx="256" cy="256" r="256" fill="#7c8cff"/>
  <circle cx="256" cy="286" r="212" fill="#8f9dff"/>

  <!-- shoulders -->
  <path d="M96 512 q14 -108 160 -108 q146 0 160 108 z" fill="#1e2245"/>
  <path d="M256 404 q-42 6 -48 36 q24 20 48 20 q24 0 48 -20 q-6 -30 -48 -36 z" fill="#eef0ff"/>
  <path d="M247 410 h18 v46 h-18 z" fill="#c98a5e"/>

  <!-- ears -->
  <ellipse cx="140" cy="270" rx="23" ry="29" fill="#c07f52"/>
  <ellipse cx="372" cy="270" rx="23" ry="29" fill="#c07f52"/>

  <!-- head -->
  <ellipse cx="256" cy="260" rx="120" ry="128" fill="#c98a5e"/>

  <!-- curly hair: a ring of curls around the crown, forehead left clear -->
  <g fill="#33200f">
    <circle cx="256" cy="120" r="50"/>
    <circle cx="198" cy="130" r="44"/>
    <circle cx="314" cy="130" r="44"/>
    <circle cx="152" cy="166" r="41"/>
    <circle cx="360" cy="166" r="41"/>
    <circle cx="226" cy="106" r="40"/>
    <circle cx="286" cy="106" r="40"/>
    <circle cx="134" cy="212" r="33"/>
    <circle cx="378" cy="212" r="33"/>
    <circle cx="128" cy="252" r="25"/>
    <circle cx="384" cy="252" r="25"/>
    <!-- fringe: a shallow scalloped edge sitting high on the forehead -->
    <path d="M144 178 q44 -40 112 -40 q68 0 112 40 q-16 26 -44 14 q-24 22 -52 6 q-28 20 -56 4 q-28 16 -52 -8 q-12 -6 -20 -16 z"/>
  </g>

  <!-- eyebrows -->
  <path d="M172 238 q36 -26 74 -8 q-36 -6 -70 12 z" fill="#33200f"/>
  <path d="M340 238 q-36 -26 -74 -8 q36 -6 70 12 z" fill="#33200f"/>

  <!-- eyes -->
  <ellipse cx="208" cy="276" rx="27" ry="28" fill="#ffffff"/>
  <ellipse cx="304" cy="276" rx="27" ry="28" fill="#ffffff"/>
  <circle cx="214" cy="280" r="13" fill="#2b1a12"/>
  <circle cx="310" cy="280" r="13" fill="#2b1a12"/>
  <circle cx="219" cy="274" r="5" fill="#ffffff"/>
  <circle cx="315" cy="274" r="5" fill="#ffffff"/>

  <!-- nose -->
  <path d="M256 288 q15 28 3 40 q-8 8 -19 2" fill="none" stroke="#9c6236" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- the moustache: thick, with curled-up ends -->
  <path d="M256 350
           q-30 -16 -62 -14
           q-34 2 -46 22
           q-10 18 6 28
           q16 10 30 -4
           q-16 4 -22 -6
           q-6 -12 10 -18
           q24 -10 50 4
           q14 8 34 8
           q20 0 34 -8
           q26 -14 50 -4
           q16 6 10 18
           q-6 10 -22 6
           q14 14 30 4
           q16 -10 6 -28
           q-12 -20 -46 -22
           q-32 -2 -62 14 z"
        fill="#33200f"/>

  <!-- smile under the moustache -->
  <path d="M216 386 q40 26 80 0" fill="none" stroke="#8a4f2c" stroke-width="10" stroke-linecap="round"/>

  <!-- cheeks -->
  <ellipse cx="166" cy="318" rx="20" ry="12" fill="#b5623c" opacity=".35"/>
  <ellipse cx="346" cy="318" rx="20" ry="12" fill="#b5623c" opacity=".35"/>
</svg>
