# Netlify configuration for the French Sound Trainer
# The app itself is static (a single HTML file). The only server-side pieces are
# the push-reminder functions in netlify/functions.

[build]
  # Serve everything in this folder as-is.
  publish = "."
  command = ""

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Serve the app at the site root ("/") without renaming the file.
# 200 = rewrite (URL stays "/"), not a visible redirect. The PWA manifest's
# start_url and the service worker's scope both assume this.
[[redirects]]
  from = "/"
  to = "/french-sounds.html"
  status = 200

# Short, stable paths for the reminder API.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Reasonable defaults. Note: no Content-Security-Policy is set, because the
# app loads audio from translate.google.com at runtime — a strict CSP would
# block it.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# The service worker must never be served stale or a new deploy can't roll out.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "no-cache"
